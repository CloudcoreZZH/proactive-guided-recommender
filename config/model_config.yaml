# 模型超参数配置

itemcf:
  similarity: "cosine"
  use_iuf: true
  top_k_similar: 50

mf:
  embedding_dim: 64
  learning_rate: 0.001
  epochs: 50
  batch_size: 1024
  reg_weight: 0.0001
  loss: "bpr"

lightgcn:
  embedding_size: 64
  n_layers: 3
  reg_weight: 0.0001
  learning_rate: 0.001
  epochs: 100
  batch_size: 2048

sasrec:
  hidden_size: 64
  num_attention_heads: 2
  num_layers: 2
  max_seq_length: 50
  learning_rate: 0.001
  epochs: 100
  batch_size: 256

rag:
  embedding_model: "BAAI/bge-large-zh-v1.5"
  top_k_retrieve: 50
  top_k_recommend: 10
  temperature: 0.3

pomelo:
  presets:
    focus:
      w_exploit: 0.9
      w_explore: 0.08
      w_serendipity: 0.02
    balanced:
      w_exploit: 0.6
      w_explore: 0.3
      w_serendipity: 0.1
    explore:
      w_exploit: 0.3
      w_explore: 0.4
      w_serendipity: 0.3
